theme:
  name: material
  logo: assets/vfo-mark.svg
  favicon: assets/vfo-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js
  - javascripts/mermaid-init.js
  - javascripts/reactflow-viewer.js
  - javascripts/diagram-viewer.js
  - javascripts/vfo-web-app.js

extra_css:
  - https://unpkg.com/@xyflow/react@12.9.2/dist/style.css
  - stylesheets/vfo-theme.css

plugins:
  - search
