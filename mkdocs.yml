site_name: vfo docs
site_description: Video File Organiser documentation
repo_name: CraigWatt/vfo
repo_url: https://github.com/CraigWatt/vfo
edit_uri: edit/main/platform/docs-site/docs/
docs_dir: platform/docs-site/docs
site_dir: platform/docs-site/site

nav:
  - Home: index.md
  - Pipeline: pipeline-end-to-end.md
  - Flow Levels: flow-levels.md
  - Profile Visual Standard: profile-visual-standard.md
  - Profile Packs: profile-packs.md
  - Capability Matrix: profile-capability-matrix.md
  - Profile Info Sheets: profiles/index.md
  - Workflow Visuals: workflow-visuals.md

theme:
  name: material
  logo: assets/vfo-mark.svg
  favicon: assets/vfo-mark.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

plugins:
  - search
