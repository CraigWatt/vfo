site_name: vfo docs
site_description: Video File Organiser documentation
repo_name: CraigWatt/vfo
repo_url: https://github.com/CraigWatt/vfo
edit_uri: edit/main/platform/docs-site/docs/
docs_dir: platform/docs-site/docs
site_dir: platform/docs-site/site

nav:
  - Home: index.md
  - Pipeline: pipeline-end-to-end.md
  - Flow Levels: flow-levels.md
  - Profile Visual Standard: profile-visual-standard.md
  - Profile Packs: profile-packs.md
  - Capability Matrix: profile-capability-matrix.md
  - Latest E2E Toolchain: e2e-toolchain-latest.md
  - Profiles:
      - Overview: profiles/index.md
      - Netflixy Main Subtitle Intent:
          - Pack Overview: profiles/packs/netflixy-main-subtitle-intent.md
          - 4K Preserve Audio + Main Subtitle Intent: profiles/generated/netflixy-preserve-audio-main-subtitle-intent-4k.md
          - 1080p Preserve Audio + Main Subtitle Intent: profiles/generated/netflixy-preserve-audio-main-subtitle-intent-1080p.md
          - Legacy Sub-HD Preserve Audio + Main Subtitle Intent: profiles/generated/netflixy-preserve-audio-main-subtitle-intent-legacy-subhd.md
      - Balanced Open Audio:
          - Pack Overview: profiles/packs/balanced-open-audio.md
          - 4K Balanced Open Audio: profiles/generated/balanced-4k-open-audio.md
          - 1080p Balanced Open Audio: profiles/generated/balanced-1080-open-audio.md
      - Device Targets Open Audio:
          - Pack Overview: profiles/packs/device-targets-open-audio.md
          - Roku Express 1080 Open Audio: profiles/generated/roku-express-1080-open-audio.md
          - Roku 4K Open Audio: profiles/generated/roku-4k-open-audio.md
          - Fire TV Stick Lite 1080 Open Audio: profiles/generated/fire-tv-stick-lite-1080-open-audio.md
          - Fire TV Stick 4K Open Audio: profiles/generated/fire-tv-stick-4k-open-audio.md
          - Fire TV Stick 4K Max Open Audio: profiles/generated/fire-tv-stick-4k-max-open-audio.md
          - Fire TV Stick 4K DV Open Audio: profiles/generated/fire-tv-stick-4k-dv-open-audio.md
          - Chromecast Google TV HD Open Audio: profiles/generated/chromecast-google-tv-hd-open-audio.md
          - Chromecast Google TV 4K Open Audio: profiles/generated/chromecast-google-tv-4k-open-audio.md
          - Apple TV HD Open Audio: profiles/generated/apple-tv-hd-open-audio.md
          - Apple TV 4K Open Audio: profiles/generated/apple-tv-4k-open-audio.md
  - Workflow Visuals: workflow-visuals.md

theme:
  name: material
  logo: assets/vfo-mark.svg
  favicon: assets/vfo-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/reactflow-viewer.js

extra_css:
  - https://unpkg.com/@xyflow/react@12.9.2/dist/style.css
  - stylesheets/vfo-theme.css

plugins:
  - search
