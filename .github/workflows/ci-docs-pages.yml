name: 📚 Docs (build + pages)

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "mkdocs.yml"
      - "platform/docs-site/**"
      - "infra/scripts/generate-profile-docs.sh"
      - "services/vfo/presets/**"
      - "services/vfo/actions/**"
      - ".github/workflows/ci-docs-pages.yml"
      - "infra/scripts/render-e2e-toolchain-doc.sh"
  push:
    branches:
      - "main"
    paths:
      - "mkdocs.yml"
      - "platform/docs-site/**"
      - "infra/scripts/generate-profile-docs.sh"
      - "services/vfo/presets/**"
      - "services/vfo/actions/**"
      - ".github/workflows/ci-docs-pages.yml"
      - "infra/scripts/render-e2e-toolchain-doc.sh"
  workflow_run:
    workflows:
      - "Validate (PR + main)"
      - "🧪 Full E2E (self-hosted media)"
    types:
      - completed
    branches:
      - "main"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🧭 Set workflow_run source metadata
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          echo "E2E_TOOLCHAIN_SOURCE_WORKFLOW=${{ github.event.workflow_run.name }}" >> "$GITHUB_ENV"
          echo "E2E_TOOLCHAIN_SOURCE_RUN_URL=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_ENV"

      - name: 📥 Download e2e toolchain artifact from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*e2e-toolchain*"
          path: tests/e2e/.reports/latest
          merge-multiple: true
        continue-on-error: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 📦 Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/docs-site/requirements.txt

      - name: 🧬 Regenerate profile docs
        run: bash infra/scripts/generate-profile-docs.sh

      - name: 🧾 Render latest e2e toolchain docs page
        run: bash infra/scripts/render-e2e-toolchain-doc.sh

      - name: 🔒 Ensure generated docs are committed
        run: |
          git diff --exit-code -- \
            platform/docs-site/docs/profiles \
            platform/docs-site/docs/profile-capability-matrix.md

      - name: 🏗️ Build docs
        run: zensical build -f mkdocs.yml

      - name: ⬆️ Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: platform/docs-site/site

  deploy:
    name: Deploy to GitHub Pages
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
