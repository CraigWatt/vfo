name: 👷📦 Generate stable release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux-build:
    name: 👷 Build files for packaging
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ❓Is brew installed
        run: brew -v

      - name: 🔨 Install CI dependencies
        run: |
          if ! brew list cmocka >/dev/null 2>&1; then
            brew install cmocka
          fi
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

      - name: 🏗️ Build + test application
        run: make ci

      - name: 💭 Cache application
        uses: actions/cache@v5
        id: vfo-build
        with:
          path: |
            ./services/vfo/bin/vfo
            ./services/vfo/src/vfo_config.conf
            ./services/vfo/actions
          key: ${{ github.sha }}

  apple-pkg:
    name: 👷 Setup macOS .pkg
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest
    timeout-minutes: 5 # Keeps your builds from running too long
    needs: [linux-build]
    
    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v6

    - name: ❓Is brew installed
      run: brew -v
      
    - name: 🔨 Install xmlstarlet
      run: brew install xmlstarlet
      
    - name: ❓Is xmlstarlet installed
      run: xmlstarlet --version
      
    - name: 🔨 Install python
      run: brew install python
      
    - name: ❓ Is python installed
      run: python -v

    - name: 🤌💭 Fetch application cache
      uses: actions/cache@v5
      id: vfo-build
      with:
        path: |
          ./services/vfo/bin/vfo
          ./services/vfo/src/vfo_config.conf
          ./services/vfo/actions
        key: ${{ github.sha }}

    - name: ✍️ ReWrite version string in build-info.plist from tag
      run: |
        xmlstarlet ed --inplace -u "/plist/dict/string[@id=9]" -v $GITHUB_REF_NAME infra/packaging/macos/build-info.plist

    - name: 🫳 Position application to payload
      run: |
        cp services/vfo/bin/vfo infra/packaging/macos/payload/bin
        cp services/vfo/actions/*.sh infra/packaging/macos/payload/bin
        cp services/vfo/src/vfo_config.conf infra/packaging/macos/payload/bin/vfo_conf_folder


    - name: Run munkipkg 🧙‍♂️📦
      id: munkipkg
      uses: joncrain/munkipkg-action@v1.5
      with:
        pkg_subdir: "infra/packaging/macos"
    
    # - name: 🏗️ Build Pkg file
    #   run: |
    #     python infra/packaging/macos/munkipkg infra/packaging/macos/vfo_macOS_installer

    - name: 💭 Cache .pkg
      uses: actions/cache@v5
      id: macos-pkg
      with:
        path: |
          ./infra/packaging/macos/build/*
        key: ${{ github.sha }}


  # linux-pkg:
  #   name: Setup Linux .pkg
  #   needs: [linux-build]

  # windows-pkg:
  #   name: Setup Windows .pkg
  #   needs: [linux-build]

  release:
    name: 📦 Release
    if: ${{ !contains(github.ref_name, '-') }}
    needs: [apple-pkg] 
    # linux-pkg, windows-pkg
    runs-on: macos-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v6

    - name: 🤌💭 fetch Application Cache
      uses: actions/cache@v5
      id: vfo-build
      with:
        path: |
            ./services/vfo/bin/vfo
            ./services/vfo/src/vfo_config.conf
            ./services/vfo/actions
        key: ${{ github.sha }}

    - name: 🫳 Position application to static build folder
      run: |
        mkdir -p static_build/bin
        mkdir -p static_build/vfo_conf_folder
        cp services/vfo/bin/vfo static_build/bin
        cp services/vfo/actions/*.sh static_build/bin
        cp services/vfo/src/vfo_config.conf static_build/vfo_conf_folder

    - name: 💁‍♂️ Generate static_build/README.txt
      run: |
        cat > static_build/README.txt <<'EOF'
        Place `bin/vfo` and all `bin/transcode_*_profile.sh` scripts in your PATH (for example `/usr/local/bin`).
        Place `vfo_conf_folder/vfo_config.conf` at `/usr/local/bin/vfo_conf_folder/vfo_config.conf`.
        Then run:
          vfo --version
          vfo doctor
        EOF

    - name: 🤐 Zip static_build folder
      run: zip -r static_build.zip static_build

    - name: 🤌💭 fetch macOS .pkg Cache
      uses: actions/cache@v5
      id: macos-pkg
      with:
        path: |
          ./infra/packaging/macos/build/*
        key: ${{ github.sha }}
  
    - name: ❓ Is gh installed
      run: gh --version

    - name: 👷📦 Release static builds & macOS pkg
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        shopt -s nullglob

        files=(./infra/packaging/macos/build/* static_build.zip)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No release files found"
          exit 1
        fi

        if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
          echo "Release ${RELEASE_TAG} already exists; uploading refreshed assets"
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
        else
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --generate-notes \
            --notes-file RELEASE.txt
        fi
  
