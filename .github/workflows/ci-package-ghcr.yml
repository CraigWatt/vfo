name: 📦 Package (GHCR)

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"
    paths:
      - "services/vfo/**"
      - "infra/packaging/container/**"
      - ".github/workflows/ci-package-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: package-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and push GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🔤 Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vfo" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: 📦 Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/packaging/container/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
