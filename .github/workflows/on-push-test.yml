name: Validate (PR + main)

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: verify brew is installed
        run: brew -v

      - name: install CI dependencies
        run: |
          if ! brew list cmocka >/dev/null 2>&1; then
            brew install cmocka
          fi
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

      - name: build + unit + hosted synthetic e2e smoke
        env:
          VFO_E2E_ASSET_MODE: synthetic
          VFO_E2E_MAX_SEEDS: "1"
        run: make ci

      - name: upload e2e debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-debug-${{ github.sha }}
          path: tests/e2e/.tmp/
          if-no-files-found: ignore
          retention-days: 7

      - name: clean test artifacts
        if: always()
        run: make clean_tests

      - name: clean build artifacts
        if: always()
        run: make clean
