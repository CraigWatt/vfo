<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VFO Web App Demo</title>
    <link rel="stylesheet" href="../stylesheets/vfo-theme.css" />
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 32%),
          radial-gradient(circle at top right, rgba(52, 211, 153, 0.1), transparent 28%),
          linear-gradient(180deg, #040b15 0%, #07111f 100%);
        color: #e5eefc;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .vfo-web-app-page {
        min-height: 100vh;
        padding: 1rem;
      }

      .vfo-web-app-page__backlink {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0 0 0.9rem;
        padding: 0.4rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        color: #e5eefc;
        text-decoration: none;
        background: rgba(12, 21, 38, 0.74);
      }

      .vfo-web-app-page__backlink:hover {
        border-color: rgba(125, 211, 252, 0.55);
      }
    </style>
  </head>
  <body>
    <main class="vfo-web-app-page">
      <a class="vfo-web-app-page__backlink" href="../">Back to docs home</a>
      <div
        class="vfo-web-app"
        data-vfo-web-app
        data-vfo-web-app-src="../e2e-toolchain-artifacts/vfo-web-app.json"
      ></div>
    </main>
    <script src="../javascripts/vfo-web-app.js"></script>
  </body>
</html>
