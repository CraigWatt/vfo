/*
 * vfo starter configuration
 *
 * Tips:
 * - Run `vfo wizard` to generate/update this file interactively.
 * - Run `vfo show` to print the active configuration summary.
 * - Run `vfo doctor` to validate paths and required tooling.
 * - Run `vfo status` (or `vfo status-json`) for component/stage readiness.
 * - Use *_LOCATIONS for semicolon-separated multi-drive paths.
 * - Use *_LOCATION_MAX_USAGE_PCT to cap how much of each drive vfo may consume.
 */

MEZZANINE_LOCATION="/Volumes/Media/mezzanine"
MEZZANINE_LOCATIONS="/Volumes/Media/mezzanine"
MEZZANINE_LOCATION_MAX_USAGE_PCT="95"
SOURCE_LOCATION="/Volumes/Media/source"
SOURCE_LOCATIONS="/Volumes/Media/source"
SOURCE_LOCATION_MAX_USAGE_PCT="95"
KEEP_SOURCE="true"

SOURCE_TEST_ACTIVE="false"
SOURCE_TEST_TRIM_START="00:00:20"
SOURCE_TEST_TRIM_DURATION="00:01:00"

/* Optional mezzanine hygiene pass:
 * - enabled=false: disabled
 * - apply_changes=false: audit only (no moves/renames)
 * - append_media_tags=true: include probe tags in filenames (UHD/HDR10/codec, etc.)
 * - strict_quality_gate=false: warn-only mode
 */
MEZZANINE_CLEAN_ENABLED="false"
MEZZANINE_CLEAN_APPLY_CHANGES="false"
MEZZANINE_CLEAN_APPEND_MEDIA_TAGS="true"
MEZZANINE_CLEAN_STRICT_QUALITY_GATE="false"

CUSTOM_FOLDER="Movies,films"
CUSTOM_FOLDER="TV Shows,tv"

PROFILE="netflixy_open_audio_1080p"
NETFLIXY_OPEN_AUDIO_1080P_LOCATION="/Volumes/Media/profiles/netflixy_open_audio_1080p"
NETFLIXY_OPEN_AUDIO_1080P_LOCATIONS="/Volumes/Media/profiles/netflixy_open_audio_1080p"
NETFLIXY_OPEN_AUDIO_1080P_LOCATION_MAX_USAGE_PCT="95"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_CODEC_NAME="h264"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_BITS="8"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_COLOR_SPACE="bt709"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_RESOLUTION_MIN_WIDTH="352"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_RESOLUTION_MAX_WIDTH="1920"
NETFLIXY_OPEN_AUDIO_1080P_CRITERIA_RESOLUTION_MAX_HEIGHT="1080"
NETFLIXY_OPEN_AUDIO_1080P_SCENARIO="ELSE"
NETFLIXY_OPEN_AUDIO_1080P_FFMPEG_COMMAND="ffmpeg -nostdin -y -i $vfo_input -map 0:v:0 -map 0:a? -map 0:s? -c:v libx264 -preset medium -crf 19 -pix_fmt yuv420p -c:a copy -c:s copy -movflags +faststart $vfo_output"

PROFILE="netflixy_open_audio_4k"
NETFLIXY_OPEN_AUDIO_4K_LOCATION="/Volumes/Media/profiles/netflixy_open_audio_4k"
NETFLIXY_OPEN_AUDIO_4K_LOCATIONS="/Volumes/Media/profiles/netflixy_open_audio_4k"
NETFLIXY_OPEN_AUDIO_4K_LOCATION_MAX_USAGE_PCT="95"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_CODEC_NAME="hevc"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_BITS="10"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_COLOR_SPACE="bt2020nc"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_RESOLUTION_MIN_WIDTH="1920"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_RESOLUTION_MIN_HEIGHT="1080"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_RESOLUTION_MAX_WIDTH="3840"
NETFLIXY_OPEN_AUDIO_4K_CRITERIA_RESOLUTION_MAX_HEIGHT="2160"
NETFLIXY_OPEN_AUDIO_4K_SCENARIO="ELSE"
NETFLIXY_OPEN_AUDIO_4K_FFMPEG_COMMAND="ffmpeg -nostdin -y -i $vfo_input -map 0:v:0 -map 0:a? -map 0:s? -c:v libx265 -preset medium -crf 21 -pix_fmt yuv420p10le -c:a copy -c:s copy -movflags +faststart $vfo_output"
