/*
 * vfo starter configuration
 *
 * Tips:
 * - Run `vfo wizard` to generate/update this file interactively.
 * - Run `vfo show` to print the active configuration summary.
 * - Run `vfo doctor` to validate paths and required tooling.
 * - Run `vfo status` (or `vfo status-json`) for component/stage readiness.
 * - Use *_LOCATIONS for semicolon-separated multi-drive paths.
 * - Use *_LOCATION_MAX_USAGE_PCT to cap how much of each drive vfo may consume.
 */

MEZZANINE_LOCATION="/Users/craigwatt/Downloads/PRACTICE101/mezzanine"
MEZZANINE_LOCATIONS="/Users/craigwatt/Downloads/PRACTICE101/mezzanine"
MEZZANINE_LOCATION_MAX_USAGE_PCT="85"
SOURCE_LOCATION="/Users/craigwatt/Downloads/PRACTICE101/source"
SOURCE_LOCATIONS="/Users/craigwatt/Downloads/PRACTICE101/source"
SOURCE_LOCATION_MAX_USAGE_PCT="85"
KEEP_SOURCE="true"

SOURCE_TEST_ACTIVE="true"
SOURCE_TEST_TRIM_START="00:00:20"
SOURCE_TEST_TRIM_DURATION="00:01:00"

/* Optional mezzanine hygiene pass:
 * - enabled=false: disabled
 * - apply_changes=false: audit only (no moves/renames)
 * - append_media_tags=true: include probe tags in filenames (UHD/HDR10/codec, etc.)
 * - strict_quality_gate=false: warn-only mode
 */
MEZZANINE_CLEAN_ENABLED="true"
MEZZANINE_CLEAN_APPLY_CHANGES="true"
MEZZANINE_CLEAN_APPEND_MEDIA_TAGS="true"
MEZZANINE_CLEAN_STRICT_QUALITY_GATE="true"

/* Optional post-profile quality scoring:
 * - enabled=false: disabled
 * - include_vmaf=false: PSNR+SSIM only (set true when ffmpeg has libvmaf)
 * - strict_gate=false: warn-only mode
 * - reference_layer=auto: source when KEEP_SOURCE=true, mezzanine when KEEP_SOURCE=false
 * - min_* thresholds at 0 disable threshold gating for that metric
 * - max_files_per_profile=0 means score all files for each profile
 */
QUALITY_CHECK_ENABLED="true"
QUALITY_CHECK_INCLUDE_VMAF="true"
QUALITY_CHECK_STRICT_GATE="true"
QUALITY_CHECK_REFERENCE_LAYER="auto"
QUALITY_CHECK_MIN_PSNR="0"
QUALITY_CHECK_MIN_SSIM="0"
QUALITY_CHECK_MIN_VMAF="0"
QUALITY_CHECK_MAX_FILES_PER_PROFILE="0"

CUSTOM_FOLDER="Movies,films"

/*
 * Stock lane 1:
 * - preserve audio streams
 * - preserve one "main subtitle" for english-speaker intent:
 *   forced english -> forced untagged/unknown -> optional default english
 * - output MKV when subtitle preservation is needed; otherwise faststart MP4
 * - guardrails:
 *   - 1080 lane only accepts SDR (`bt709`) candidates in 352x240..1920x1080
 *   - 4K lane accepts SDR/HDR in 1920x1080..3840x2160
 *   - codec intake is broad (`any`)
 */
PROFILE="netflixy_preserve_audio_main_subtitle_intent_1080p"
NETFLIXY_PRESERVE_AUDIO_MAIN_SUBTITLE_INTENT_1080P_LOCATION="/Users/craigwatt/Downloads/PRACTICE101/profiles/netflixy_preserve_audio_main_subtitle_intent_1080p"
