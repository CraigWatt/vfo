/*
 * roku_family_all_sub_convert_audio_conform preset block
 *
 * Copy these profile entries into your active vfo_config.conf and update all
 * paths.
 *
 * Intent:
 * - use H.264 for HD Roku outputs
 * - use HEVC for UHD Roku outputs
 * - preserve all subtitles first, but convert text subtitles when MP4-friendly
 *   delivery is possible
 * - preserve AAC and Dolby-family audio where already acceptable
 * - conform DTS-family and PCM-family audio when needed
 */

PROFILE="roku_family_hd_all_sub_convert_audio_conform"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_LOCATION="/Volumes/Media/profiles/roku_family_hd_all_sub_convert_audio_conform"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_LOCATIONS="/Volumes/Media/profiles/roku_family_hd_all_sub_convert_audio_conform"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_LOCATION_MAX_USAGE_PCT="95"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_CODEC_NAME="any"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_BITS="0"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_COLOR_SPACE="any"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_RESOLUTION_MIN_WIDTH="352"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_RESOLUTION_MAX_WIDTH="1920"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_CRITERIA_RESOLUTION_MAX_HEIGHT="1080"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_SCENARIO="RES_JUST_RIGHT"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_FFMPEG_COMMAND="transcode_h264_1080_all_sub_convert_audio_conform_profile.sh $vfo_input $vfo_output"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_SCENARIO="ELSE"
ROKU_FAMILY_HD_ALL_SUB_CONVERT_AUDIO_CONFORM_FFMPEG_COMMAND="profile_guardrail_skip.sh $vfo_input $vfo_output roku_family_hd_all_sub_convert_audio_conform_guardrail_requires_352x240_to_1920x1080_input"

PROFILE="roku_family_4k_all_sub_convert_audio_conform"
