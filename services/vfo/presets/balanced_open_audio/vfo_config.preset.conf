/*
 * balanced_open_audio preset block
 *
 * Copy these profile entries into your active vfo_config.conf and update all paths.
 *
 * IMPORTANT:
 * - Keep using your existing global locations and custom folders.
 * - Update output locations to match your environment.
 * - Action scripts are referenced by command name and should be in your PATH.
 */

ALIAS="balanced_4k_open_audio"
BALANCED_4K_OPEN_AUDIO_LOCATION="/Volumes/Media/profiles/balanced_4k_open_audio"
BALANCED_4K_OPEN_AUDIO_LOCATIONS="/Volumes/Media/profiles/balanced_4k_open_audio"
BALANCED_4K_OPEN_AUDIO_LOCATION_MAX_USAGE_PCT="95"
BALANCED_4K_OPEN_AUDIO_CRITERIA_CODEC_NAME="hevc"
BALANCED_4K_OPEN_AUDIO_CRITERIA_COLOR_SPACE="bt709"
BALANCED_4K_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_WIDTH="352"
BALANCED_4K_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
BALANCED_4K_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_WIDTH="3840"
BALANCED_4K_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_HEIGHT="2160"

/* Exact match: remux/copy */
BALANCED_4K_OPEN_AUDIO_SCENARIO="CODEC_JUST_RIGHT RES_JUST_RIGHT"
BALANCED_4K_OPEN_AUDIO_FFMPEG_COMMAND="ffmpeg -nostdin -i $vfo_input -c copy -map 0 -movflags faststart -strict -2 $vfo_output"

/* Anything above profile ceiling: transcode with hardware-aware 4K action */
BALANCED_4K_OPEN_AUDIO_SCENARIO="RES_TOO_HIGH"
BALANCED_4K_OPEN_AUDIO_FFMPEG_COMMAND="transcode_hevc_4k_profile.sh $vfo_input $vfo_output"

/* Fallback */
BALANCED_4K_OPEN_AUDIO_SCENARIO="ELSE"
BALANCED_4K_OPEN_AUDIO_FFMPEG_COMMAND="transcode_hevc_4k_profile.sh $vfo_input $vfo_output"


ALIAS="balanced_1080_open_audio"
BALANCED_1080_OPEN_AUDIO_LOCATION="/Volumes/Media/profiles/balanced_1080_open_audio"
BALANCED_1080_OPEN_AUDIO_LOCATIONS="/Volumes/Media/profiles/balanced_1080_open_audio"
BALANCED_1080_OPEN_AUDIO_LOCATION_MAX_USAGE_PCT="95"
BALANCED_1080_OPEN_AUDIO_CRITERIA_CODEC_NAME="h264"
BALANCED_1080_OPEN_AUDIO_CRITERIA_COLOR_SPACE="bt709"
BALANCED_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_WIDTH="352"
BALANCED_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
BALANCED_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_WIDTH="1920"
BALANCED_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_HEIGHT="1080"

/* Exact match: remux/copy */
BALANCED_1080_OPEN_AUDIO_SCENARIO="CODEC_JUST_RIGHT RES_JUST_RIGHT"
BALANCED_1080_OPEN_AUDIO_FFMPEG_COMMAND="ffmpeg -nostdin -i $vfo_input -c copy -map 0 -movflags faststart -strict -2 $vfo_output"

/* Anything above profile ceiling: transcode with hardware-aware 1080p action */
BALANCED_1080_OPEN_AUDIO_SCENARIO="RES_TOO_HIGH"
BALANCED_1080_OPEN_AUDIO_FFMPEG_COMMAND="transcode_hevc_1080_profile.sh $vfo_input $vfo_output"

/* Fallback */
BALANCED_1080_OPEN_AUDIO_SCENARIO="ELSE"
BALANCED_1080_OPEN_AUDIO_FFMPEG_COMMAND="transcode_hevc_1080_profile.sh $vfo_input $vfo_output"
