ALIAS="roku_express_1080_open_audio"
ROKU_EXPRESS_1080_OPEN_AUDIO_LOCATION="/Volumes/Media/profiles/roku_express_1080_open_audio"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_CODEC_NAME="h264"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_COLOR_SPACE="bt709"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_WIDTH="352"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_WIDTH="1920"
ROKU_EXPRESS_1080_OPEN_AUDIO_CRITERIA_RESOLUTION_MAX_HEIGHT="1080"
ROKU_EXPRESS_1080_OPEN_AUDIO_SCENARIO="CODEC_JUST_RIGHT RES_JUST_RIGHT"
ROKU_EXPRESS_1080_OPEN_AUDIO_FFMPEG_COMMAND="ffmpeg -nostdin -i $vfo_input -c copy -map 0 -movflags faststart -strict -2 $vfo_output"
ROKU_EXPRESS_1080_OPEN_AUDIO_SCENARIO="RES_TOO_HIGH"
ROKU_EXPRESS_1080_OPEN_AUDIO_FFMPEG_COMMAND="/ABS/PATH/services/vfo/actions/transcode_h264_1080_hdr_to_sdr_profile.sh $vfo_input $vfo_output"
ROKU_EXPRESS_1080_OPEN_AUDIO_SCENARIO="ELSE"
ROKU_EXPRESS_1080_OPEN_AUDIO_FFMPEG_COMMAND="/ABS/PATH/services/vfo/actions/transcode_h264_1080_hdr_to_sdr_profile.sh $vfo_input $vfo_output"

