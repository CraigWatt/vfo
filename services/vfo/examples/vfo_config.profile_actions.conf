/*
 * Example profile-action config snippet.
 * Action scripts are referenced by command name and expected in PATH.
 */

ORIGINAL_LOCATION="/Volumes/Media/original"
ORIGINAL_LOCATIONS="/Volumes/Media/original"
ORIGINAL_LOCATION_MAX_USAGE_PCT="95"
SOURCE_LOCATION="/Volumes/Media/source"
SOURCE_LOCATIONS="/Volumes/Media/source"
SOURCE_LOCATION_MAX_USAGE_PCT="95"
KEEP_SOURCE="true"

CUSTOM_FOLDER="Movies,films"
CUSTOM_FOLDER="TV Shows,tv"

/* 4K target profile */
ALIAS="roku4k"
ROKU4K_LOCATION="/Volumes/Media/profiles/roku4k"
ROKU4K_LOCATIONS="/Volumes/Media/profiles/roku4k"
ROKU4K_LOCATION_MAX_USAGE_PCT="95"
ROKU4K_CRITERIA_CODEC_NAME="hevc"
ROKU4K_CRITERIA_COLOR_SPACE="bt709"
ROKU4K_CRITERIA_RESOLUTION_MIN_WIDTH="352"
ROKU4K_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
ROKU4K_CRITERIA_RESOLUTION_MAX_WIDTH="3840"
ROKU4K_CRITERIA_RESOLUTION_MAX_HEIGHT="2160"

ROKU4K_SCENARIO="CODEC_JUST_RIGHT RES_JUST_RIGHT"
ROKU4K_FFMPEG_COMMAND="ffmpeg -nostdin -i $vfo_input -c copy -map 0 -movflags faststart -strict -2 $vfo_output"

ROKU4K_SCENARIO="RES_TOO_HIGH"
ROKU4K_FFMPEG_COMMAND="transcode_hevc_4k_profile.sh $vfo_input $vfo_output"

ROKU4K_SCENARIO="ELSE"
ROKU4K_FFMPEG_COMMAND="transcode_hevc_4k_profile.sh $vfo_input $vfo_output"

/* 1080p target profile */
ALIAS="roku1080"
ROKU1080_LOCATION="/Volumes/Media/profiles/roku1080"
ROKU1080_LOCATIONS="/Volumes/Media/profiles/roku1080"
ROKU1080_LOCATION_MAX_USAGE_PCT="95"
ROKU1080_CRITERIA_CODEC_NAME="h264"
ROKU1080_CRITERIA_COLOR_SPACE="bt709"
ROKU1080_CRITERIA_RESOLUTION_MIN_WIDTH="352"
ROKU1080_CRITERIA_RESOLUTION_MIN_HEIGHT="240"
ROKU1080_CRITERIA_RESOLUTION_MAX_WIDTH="1920"
ROKU1080_CRITERIA_RESOLUTION_MAX_HEIGHT="1080"

ROKU1080_SCENARIO="CODEC_JUST_RIGHT RES_JUST_RIGHT"
ROKU1080_FFMPEG_COMMAND="ffmpeg -nostdin -i $vfo_input -c copy -map 0 -movflags faststart -strict -2 $vfo_output"

ROKU1080_SCENARIO="RES_TOO_HIGH"
ROKU1080_FFMPEG_COMMAND="transcode_h264_1080_hdr_to_sdr_profile.sh $vfo_input $vfo_output"

ROKU1080_SCENARIO="ELSE"
ROKU1080_FFMPEG_COMMAND="transcode_h264_1080_hdr_to_sdr_profile.sh $vfo_input $vfo_output"
